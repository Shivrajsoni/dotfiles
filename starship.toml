[custom.cpp]
detect_extensions = ['cpp']
symbol = " "
format = 'via $symbol($output) '
command = 'g++ --version 2>/dev/null | head -1 | grep -oE "[0-9]+\\.[0-9]+\\.[0-9]+" | head -1'

