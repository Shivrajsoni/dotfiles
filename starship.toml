"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 5000

[package]
disabled = true

format = '$all$directory$character' 
right_format = ''

[character]
error_symbol = "[έζψ](bold red)"

[cmd_duration]
min_time = 5000
format = '[$duration](bold yellow)'


[shell]
fish_indicator = ''
nu_indicator = 'nu '
zsh_indicator = 'zshΌψΛ '
bash_indicator = 'ΌψΛ '
format = '[$indicator]($style)'
style = 'cyan bold'
disabled = false

[directory]
truncate_to_repo = true 
truncation_length = 2
truncation_symbol = ''
style = 'white'


[git_branch]
style = 'green'
symbol = '[ΎΡα ](green)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bold purple"
disabled = true

[git_metrics]
disabled = false
ignore_submodules = true
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[aws]
symbol = "ΌΝ╜  "

