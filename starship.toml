"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 5000

# Prompt: info on line 1, directory + cursor on line 2
format = '$all$line_break$directory$character'
right_format = '$time'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

[directory]
truncate_to_repo = false
truncation_length = 3
truncation_symbol = '…/'

[cmd_duration]
min_time = 5000
format = '[$duration](bold yellow) '

[git_branch]
style = 'bold blue'
symbol = ' '

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[git_metrics]
disabled = false
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[time]
disabled = false
format = '[$time]($style)'
time_format = '%H:%M'
style = 'bold white'

[hostname]
ssh_only = true
format = '[$hostname]($style) '
style = 'bold yellow'

[username]
show_always = false
format = '[$user]($style)@'
style_user = 'bold blue'

# Language symbols (nerd font icons)
[nodejs]
symbol = ' '

[python]
symbol = ' '

[rust]
symbol = '󱘗 '

[golang]
symbol = ' '

[c]
symbol = ' '

[java]
symbol = ' '

[docker_context]
symbol = ' '

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true
