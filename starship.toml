# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

command_timeout = 5000

# Move the directory to the second line; extra $line_break adds gap
format = '$all$line_break$directory$character'
# Time on the right (fill pushes it to the right edge)
right_format = '$time'

[package]
disabled = true

[character]
error_symbol = "[έζψ](bold red)"

[cmd_duration]
min_time = 5000
format = '[$duration](bold yellow)'

[directory]
truncate_to_repo = false
truncation_length = 3
truncation_symbol = 'έΑο/'

[shell]
fish_indicator = ''
nu_indicator = 'nu '
zsh_indicator = 'zsh '
bash_indicator = ' '
format = '[$indicator]($style)'
style = 'cyan bold'
disabled = false

[git_branch]
disabled = false
style = "bold blue"
symbol = '[ΎΡα](green) '

[git_commit]
disabled = false

[git_state]
disabled = false
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bold purple"

[git_metrics]
disabled = false
ignore_submodules = true
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
format = '([$all_status$ahead_behind]($style) )'

# Time (shown on right via right_format)
[time]
disabled = false
format = '[ $time ]($style)'
time_format = '%H:%M'
style = 'bold white'

[aws]
symbol = "ΌΝ╜  "

